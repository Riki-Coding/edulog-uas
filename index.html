<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLog - Student Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <!-- Tailwind & FontAwesome CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #FFFDF9; color: #333; }
        .bg-maroon { background-color: #800000; }
        .text-maroon { color: #800000; }
        .border-maroon { border-color: #800000; }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-maroon text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> EduLog
            </h1>
            <!-- Indicator Koneksi (UI/UX Kriteria) -->
            <div id="connectionBadge" class="flex items-center gap-2 bg-amber-700/50 px-3 py-1 rounded-full text-xs font-semibold transition-all">
                <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-amber-400 animate-pulse"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-xs border border-stone-200 text-center">
                <p class="text-xs text-stone-500 font-medium uppercase">Total Log</p>
                <p id="statTotal" class="text-2xl font-bold text-stone-800">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-xs border border-stone-200 text-center">
                <p class="text-xs text-amber-600 font-medium uppercase">Pending Sync</p>
                <p id="statPending" class="text-2xl font-bold text-amber-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-xs border border-stone-200 text-center">
                <p class="text-xs text-emerald-700 font-medium uppercase">Synced</p>
                <p id="statSynced" class="text-2xl font-bold text-emerald-700">0</p>
            </div>
        </div>

        <!-- Form Input -->
        <section class="bg-white p-6 rounded-xl shadow-xs border border-stone-200 mb-6">
            <h2 class="text-lg font-bold text-maroon mb-4 flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> Input Catatan Siswa
            </h2>
            <form id="logForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1">Nama Siswa</label>
                    <input type="text" id="studentName" required class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:outline-none bg-stone-50 text-sm">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-1">Kategori Aktivitas</label>
                        <select id="activityType" class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:outline-none bg-stone-50 text-sm">
                            <option value="Kehadiran">Kehadiran (Absensi)</option>
                            <option value="Perilaku Positif">Perilaku Positif</option>
                            <option value="Perlu Perhatian">Perlu Perhatian</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-1">Detail Catatan</label>
                        <input type="text" id="activityDetail" required class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-red-800 focus:outline-none bg-stone-50 text-sm" placeholder="Contoh: Terlambat 15 menit / Membantu teman">
                    </div>
                </div>
                <button type="submit" class="w-full bg-maroon text-white font-semibold py-2.5 rounded-lg shadow-md hover:bg-red-900 transition flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-floppy-disk"></i> Simpan ke IndexedDB
                </button>
            </form>
        </section>

        <!-- Data Table / List -->
        <section class="bg-white p-6 rounded-xl shadow-xs border border-stone-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-maroon flex items-center gap-2">
                    <i class="fa-solid fa-database"></i> Database Lokal (IndexedDB)
                </h2>
                <button onclick="triggerSync()" class="text-xs bg-emerald-700 hover:bg-emerald-800 text-white px-3 py-1.5 rounded-lg font-medium shadow-xs transition flex items-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-rotate"></i> Sync Cloud
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="border-b border-stone-200 text-stone-500">
                            <th class="pb-3 font-semibold">Siswa</th>
                            <th class="pb-3 font-semibold">Kategori</th>
                            <th class="pb-3 font-semibold">Catatan</th>
                            <th class="pb-3 font-semibold text-center">Status Cloud</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-stone-100 text-stone-700">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Toast Notification (UI/UX Feedback) -->
    <div id="toast" class="fixed bottom-4 right-4 bg-stone-900 text-white px-4 py-3 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2 z-50 text-sm"></div>

    <script>
        // === INDEXEDDB ENGINE ===
        let db;
        const request = indexedDB.open("EduLogDB", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            renderLogs();
            checkNetworkStatus();
        };

        // === UI & NOTIFICATION ENGINE ===
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById("toast");
            toast.innerHTML = isSuccess ? `✓ ${message}` : `⚠ ${message}`;
            toast.className = "fixed bottom-4 right-4 bg-stone-900 text-white px-4 py-3 rounded-xl shadow-lg transform translate-y-0 opacity-100 transition-all duration-300 flex items-center gap-2 z-50 text-sm";
            setTimeout(() => {
                toast.className = "fixed bottom-4 right-4 bg-stone-900 text-white px-4 py-3 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2 z-50 text-sm";
            }, 3000);
        }

        // === NETWORK & SINKRONISASI ENGINE ===
        function checkNetworkStatus() {
            const badge = document.getElementById("connectionBadge");
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");

            if (navigator.onLine) {
                badge.className = "flex items-center gap-2 bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-semibold";
                dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
                text.innerText = "Online";
                triggerSync(); // Auto sync saat terdeteksi online
            } else {
                badge.className = "flex items-center gap-2 bg-rose-100 text-rose-800 px-3 py-1 rounded-full text-xs font-semibold";
                dot.className = "w-2.5 h-2.5 rounded-full bg-rose-500";
                text.innerText = "Offline Mode";
            }
        }

        window.addEventListener('online', checkNetworkStatus);
        window.addEventListener('offline', checkNetworkStatus);

        // Fungsi Sinkronisasi Data ke Server Cloud Mock API
        function triggerSync() {
            if (!navigator.onLine || !db) return;

            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                const allLogs = getAllRequest.result;
                const pendingLogs = allLogs.filter(log => log.synced === 0);

                if (pendingLogs.length === 0) return;

                showToast(`Sinkronisasi ${pendingLogs.length} data ke cloud...`);

                // Simulasi Fetch API POST ke REST server dummy
                fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    body: JSON.stringify(pendingLogs),
                    headers: { 'Content-type': 'application/json; charset=UTF-8' }
                })
                .then(res => {
                    if (res.ok) {
                        // Jika sukses, update status 'synced' menjadi 1 di IndexedDB
                        const updateTransaction = db.transaction(["logs"], "readwrite");
                        const updateStore = updateTransaction.objectStore("logs");
                        
                        pendingLogs.forEach(log => {
                            log.synced = 1;
                            updateStore.put(log);
                        });

                        updateTransaction.oncomplete = function() {
                            showToast("Semua data lokal berhasil disinkronkan ke Cloud!");
                            renderLogs();
                        };
                    }
                })
                .catch(err => console.error("Sync failed:", err));
            };
        }

        // === CRUD OPERATIONS ===
        document.getElementById("logForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const newLog = {
                studentName: document.getElementById("studentName").value,
                activityType: document.getElementById("activityType").value,
                activityDetail: document.getElementById("activityDetail").value,
                synced: 0 // Default 0 (Belum sinkron)
            };

            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            store.add(newLog);

            transaction.oncomplete = function() {
                showToast("Data berhasil disimpan ke database lokal!");
                document.getElementById("logForm").reset();
                renderLogs();
                if (navigator.onLine) triggerSync();
            };
        });

        function renderLogs() {
            if (!db) return;
            const store = db.transaction(["logs"], "readonly").objectStore("logs");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                const logs = getAllRequest.result;
                const tbody = document.getElementById("logTableBody");
                tbody.innerHTML = "";

                let total = logs.length;
                let pending = 0;
                let synced = 0;

                logs.reverse().forEach(log => {
                    if (log.synced === 1) synced++; else pending++;

                    const syncBadge = log.synced === 1 
                        ? `<span class="bg-emerald-100 text-emerald-800 text-xs px-2 py-0.5 rounded-full font-medium"><i class="fa-solid fa-cloud"></i> Synced</span>`
                        : `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded-full font-medium"><i class="fa-solid fa-clock shadow-xs"></i> Pending</span>`;

                    let categoryColor = "text-stone-700 font-medium";
                    if(log.activityType === "Perilaku Positif") categoryColor = "text-emerald-700 font-semibold";
                    if(log.activityType === "Perlu Perhatian") categoryColor = "text-amber-700 font-semibold";

                    const tr = document.createElement("tr");
                    tr.className = "border-b border-stone-100 hover:bg-stone-50/50 transition";
                    tr.innerHTML = `
                        <td class="py-3 font-medium">${log.studentName}</td>
                        <td class="py-3 ${categoryColor}">${log.activityType}</td>
                        <td class="py-3 text-stone-500">${log.activityDetail}</td>
                        <td class="py-3 text-center">${syncBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Update Stats
                document.getElementById("statTotal").innerText = total;
                document.getElementById("statPending").innerText = pending;
                document.getElementById("statSynced").innerText = synced;
            };
        }

        // === REGISTER SERVICE WORKER (PWA Kriteria) ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker terdaftar!', reg.scope))
                    .catch(err => console.log('Service Worker gagal:', err));
            });
        }
    </script>
</body>
</html>
